# TB2 with the UN-quantized Qwen3.5-35B-A3B (bf16, TP=4) at a 32k window so
# Terminus's compaction actually triggers. Group feedback: quantized models
# scored 0; this is the strongest open model we can serve on one node.
job_name: tb2-35b-bf16-easy25
jobs_dir: /scratch/anangia/tb2/jobs
n_concurrent_trials: 2
n_attempts: 1

agents:
  - name: terminus-2
    model_name: hosted_vllm/qwen35-35b-bf16
    kwargs:
      api_base: http://127.0.0.1:8000/v1
      model_info:
        max_input_tokens: 32768
        max_output_tokens: 8192
        input_cost_per_token: 0.0
        output_cost_per_token: 0.0

environment:
  type: singularity
  kwargs:
    singularity_image_cache_dir: /scratch/anangia/tb2/sif_cache

tasks:
